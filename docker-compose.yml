services:
  app:
    build:
      context: .
      args:
        - DATABASE_URL=postgresql://postgres:password@localhost:5432/vibe_db?schema=public
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/vibe_db?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vibenet

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=vibe_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibenet
    volumes:
      - vibe_pgdata:/var/lib/postgresql/data

networks:
  vibenet:
    driver: bridge

volumes:
  vibe_pgdata:
